VAE的核心思想
相比于传统的编码器，VAE是通过引入隐变量Z来使用概率模型的生成模型。
理想形态下的生成模型可以被描述为$ X^!=P(Z) \(,`Z`是引入的隐变量。如果我们能够将输入样本`X`的一系列特征编码得到`Z`控制在已知的某个分布中，那么就能够在隐变量的分布空间中采样解码得到生成内容\)
